<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雀魂 AutoMod 仪表盘</title>
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;
  --text:#e6edf3;--dim:#8b949e;--accent:#58a6ff;
  --good:#3fb950;--warn:#d29922;--bad:#f85149;
  --tile-bg:#f5f0e8;--tile-text:#1a1a1a;--tile-red:#d4380d;
  --m:#1a1a1a;--p:#1a1a1a;--s:#1a1a1a;--z:#1a1a1a;
  --m-bg:#fff;--p-bg:#fff;--s-bg:#fff;--z-bg:#fafafa;
  --font-mono:'Cascadia Code','Fira Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
  min-height:100vh}
a{color:var(--accent)}

/* ═══════════════ LAYOUT ═══════════════ */
#app{max-width:1200px;margin:0 auto;padding:12px 16px}
header{display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;padding:10px 0;
  border-bottom:1px solid var(--border);margin-bottom:12px}
header h1{font-size:1.4rem;font-weight:700}
header .sub{color:var(--dim);font-size:0.85rem}
.status-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:12px;font-size:0.78rem;font-weight:600}
.badge.on{background:var(--good);color:#000}
.badge.off{background:var(--bad);color:#fff}
.badge.idle{background:var(--border);color:var(--dim)}

.grid{display:grid;grid-template-columns:1fr 340px;gap:14px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}

.panel{background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:14px;margin-bottom:14px}
.panel h3{font-size:0.95rem;margin-bottom:10px;color:var(--accent);
  border-bottom:1px solid var(--border);padding-bottom:6px}

/* ═══════════════ TILES ═══════════════ */
.tile-row{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0;align-items:center}
.tile{display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:50px;border-radius:4px;
  font-size:0.85rem;font-weight:700;line-height:1;
  background:var(--tile-bg);color:var(--tile-text);
  border:1px solid #d0c8b8;position:relative;cursor:default;
  box-shadow:1px 2px 3px rgba(0,0,0,.15);user-select:none;
  transition:transform .1s}
.tile:hover{transform:translateY(-2px);z-index:2}
.tile .vn{font-size:1.1rem}.tile .st{font-size:0.58rem;display:block;line-height:1}
.tile.red{color:var(--tile-red)}
.tile.dora{box-shadow:0 0 0 2px var(--warn),1px 2px 3px rgba(0,0,0,.15)}
.tile.sep{margin-left:6px}
.tile.drawn{border:2px solid var(--accent);box-shadow:0 0 6px var(--accent)}
.tile.small{width:28px;height:37px;font-size:0.7rem}
.tile.small .vn{font-size:0.85rem}.tile.small .st{font-size:0.5rem}
.tile.empty{background:#e8e4da;border-style:dashed;color:#c0b8a8}

.discard-row{display:flex;flex-wrap:wrap;gap:2px}
.discard-row .tile{width:30px;height:40px;font-size:0.7rem;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.discard-row .tile .vn{font-size:0.9rem}.discard-row .tile .st{font-size:0.48rem}

/* ═══════════════ PLAYER ═══════════════ */
.player-card{margin-bottom:10px;padding:8px;border-radius:6px;
  background:rgba(255,255,255,.02)}
.player-card.self{border-left:3px solid var(--accent)}
.player-card .name{font-weight:600;margin-bottom:4px;font-size:0.88rem}
.player-card .meta{color:var(--dim);font-size:0.75rem;margin-bottom:4px}
.player-card .meld-row{display:flex;gap:4px;flex-wrap:wrap;margin:2px 0}
.meld-tag{font-size:0.7rem;padding:2px 6px;border-radius:3px;
  background:rgba(255,255,255,.06);color:var(--dim)}

/* ═══════════════ GAME INFO ═══════════════ */
.game-info{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.game-info .item{text-align:center;min-width:44px}
.game-info .val{font-size:1.3rem;font-weight:700;color:var(--accent)}
.game-info .lbl{font-size:0.7rem;color:var(--dim)}

/* ═══════════════ LOG ═══════════════ */
#log-container{max-height:400px;overflow-y:auto;font-family:var(--font-mono);
  font-size:0.78rem;line-height:1.5}
#log-container .entry{padding:3px 6px;border-bottom:1px solid rgba(255,255,255,.03);
  animation:fadeIn .2s}
#log-container .entry.ai{color:var(--accent)}
#log-container .entry.action{color:var(--good)}
#log-container .entry.fail{color:var(--bad)}
#log-container .entry.event{color:var(--dim)}
#log-container .time{color:var(--dim);margin-right:6px}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:var(--panel);color:var(--text);cursor:pointer;
  font-size:0.82rem;transition:all .15s}
.btn:hover{background:#1f2937;border-color:var(--accent)}
.btn.accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn.danger{background:var(--bad);color:#fff;border-color:var(--bad)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ═══════════════ STRATEGY SLIDERS ═══════════════ */
.slider-group{margin-bottom:10px}
.slider-group label{display:flex;justify-content:space-between;
  font-size:0.8rem;margin-bottom:2px}
.slider-group input[type=range]{width:100%;accent-color:var(--accent)}
.slider-group .range-val{color:var(--accent);font-weight:600}

/* ═══════════════ CONNECTION ═══════════════ */
#conn-status{font-size:0.78rem;display:flex;align-items:center;gap:5px}
#conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#conn-dot.live{background:var(--good);box-shadow:0 0 6px var(--good)}
#conn-dot.dead{background:var(--bad)}
</style>
</head>
<body>

<div id="app">
<header>
  <div>
    <h1>🀄 雀魂 AutoMod <span class="sub">v2.1</span></h1>
  </div>
  <div class="status-row">
    <span id="conn-status"><span id="conn-dot" class="dead"></span> <span id="conn-text">未连接</span></span>
    <span id="auto-badge" class="badge off">AUTO OFF</span>
    <span id="game-badge" class="badge idle">未在游戏中</span>
  </div>
</header>

<div class="grid">
  <!-- ── 左栏：游戏状态 ── -->
  <div>
    <!-- 局况 -->
    <div class="panel">
      <h3>📊 局况</h3>
      <div class="game-info" id="round-info">
        <div class="item"><div class="val">-</div><div class="lbl">局</div></div>
        <div class="item"><div class="val">-</div><div class="lbl">本场</div></div>
        <div class="item"><div class="val">-</div><div class="lbl">剩余</div></div>
        <div class="item"><div class="val">-</div><div class="lbl">宝牌指示</div></div>
        <div class="item"><div class="val">-</div><div class="lbl">立直棒</div></div>
      </div>
    </div>

    <!-- 自家手牌 -->
    <div class="panel">
      <h3>🀫 自家手牌 <span style="color:var(--dim);font-weight:400;font-size:0.75rem" id="hand-shanten"></span></h3>
      <div class="tile-row" id="hand-tiles">
        <span class="tile empty"><span class="vn">?</span></span>
      </div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--dim)">
        舍牌: <span id="self-discard-area"></span>
      </div>
      <div style="margin-top:2px;font-size:0.75rem;color:var(--dim)" id="self-meld-area"></div>
    </div>

    <!-- 对手信息 -->
    <div class="panel" id="opponents-panel">
      <h3>👥 对手</h3>
      <div id="opponents"></div>
    </div>
  </div>

  <!-- ── 右栏：控制面板 + 日志 ── -->
  <div>
    <!-- 控制 -->
    <div class="panel">
      <h3>🎮 控制面板</h3>
      <div style="font-size:0.82rem;margin-bottom:8px">
        执行动作: <strong id="exec-count">0</strong> |
        失败: <strong id="fail-count" style="color:var(--bad)">0</strong>
      </div>
      <div class="btn-row">
        <button class="btn accent" onclick="api('toggle')">切换自动</button>
        <button class="btn danger" onclick="api('kill')">紧急停止</button>
        <button class="btn" onclick="api('simulate')">模拟对局</button>
        <button class="btn" onclick="api('clear_log')">清除日志</button>
      </div>
    </div>

    <!-- 策略 -->
    <div class="panel">
      <h3>📐 AI 策略</h3>
      <div class="slider-group">
        <label>攻击性 <span class="range-val" id="val-agg">3</span></label>
        <input type="range" min="1" max="5" value="3" id="slider-agg"
               oninput="onStrategyChange()" onchange="onStrategyChange()">
      </div>
      <div class="slider-group">
        <label>速度偏好 <span class="range-val" id="val-speed">3</span></label>
        <input type="range" min="1" max="5" value="3" id="slider-speed"
               oninput="onStrategyChange()" onchange="onStrategyChange()">
      </div>
      <div class="slider-group">
        <label>风险容忍度 <span class="range-val" id="val-risk">3</span></label>
        <input type="range" min="1" max="5" value="3" id="slider-risk"
               oninput="onStrategyChange()" onchange="onStrategyChange()">
      </div>
      <button class="btn" onclick="api('apply_strategy')">应用策略</button>
    </div>

    <!-- 日志 -->
    <div class="panel">
      <h3>📝 事件日志</h3>
      <div id="log-container"><div class="entry event">等待事件...</div></div>
    </div>
  </div>
</div>
</div>

<script>
// ═══════════════ MAHJONG DATA ═══════════════
const TILES = {
  // 万 0-8
  0:{v:'1',s:'m',u:'🀇'},1:{v:'2',s:'m',u:'🀈'},2:{v:'3',s:'m',u:'🀉'},
  3:{v:'4',s:'m',u:'🀊'},4:{v:'5',s:'m',u:'🀋'},5:{v:'6',s:'m',u:'🀌'},
  6:{v:'7',s:'m',u:'🀍'},7:{v:'8',s:'m',u:'🀎'},8:{v:'9',s:'m',u:'🀏'},
  // 筒 9-17
  9:{v:'1',s:'p',u:'🀙'},10:{v:'2',s:'p',u:'🀚'},11:{v:'3',s:'p',u:'🀛'},
  12:{v:'4',s:'p',u:'🀜'},13:{v:'5',s:'p',u:'🀝'},14:{v:'6',s:'p',u:'🀞'},
  15:{v:'7',s:'p',u:'🀟'},16:{v:'8',s:'p',u:'🀠'},17:{v:'9',s:'p',u:'🀡'},
  // 索 18-26
  18:{v:'1',s:'s',u:'🀐'},19:{v:'2',s:'s',u:'🀑'},20:{v:'3',s:'s',u:'🀒'},
  21:{v:'4',s:'s',u:'🀓'},22:{v:'5',s:'s',u:'🀔'},23:{v:'6',s:'s',u:'🀕'},
  24:{v:'7',s:'s',u:'🀖'},25:{v:'8',s:'s',u:'🀗'},26:{v:'9',s:'s',u:'🀘'},
  // 字 27-33
  27:{v:'东',s:'z',u:'🀀'},28:{v:'南',s:'z',u:'🀁'},29:{v:'西',s:'z',u:'🀂'},
  30:{v:'北',s:'z',u:'🀃'},31:{v:'白',s:'z',u:'🀄'},32:{v:'发',s:'z',u:'🀅'},
  33:{v:'中',s:'z',u:'🀆'},
  // 赤5 (34-36)
  34:{v:'5',s:'m',u:'🀋',r:1},35:{v:'5',s:'p',u:'🀝',r:1},36:{v:'5',s:'s',u:'🀔',r:1}
};
const WINDS = ['东','南','西','北'];
const MELD_NAMES = {1:'吃',2:'碰',3:'明杠',4:'暗杠',5:'加杠'};

function tileHTML(t, cls='', isDora=false){
  const d = TILES[t] || {v:'?',s:'?',u:'?'};
  const rc = d.r ? ' red' : '';
  const dc = isDora ? ' dora' : '';
  return `<span class="tile ${cls}${rc}${dc}"><span class="vn">${d.v}</span><span class="st">${d.s}</span></span>`;
}
function tileSmall(t,cls=''){
  const d = TILES[t] || {v:'?',s:'?',u:'?'};
  const rc = d.r ? ' red' : '';
  return `<span class="tile small ${cls}${rc}"><span class="vn">${d.v}</span><span class="st">${d.s}</span></span>`;
}

// ═══════════════ SSE ═══════════════
let evtSource = null;
let logLines = [];

function connectSSE(){
  if(evtSource) evtSource.close();
  evtSource = new EventSource('/events');
  evtSource.onopen = ()=>{
    document.getElementById('conn-dot').className = 'live';
    document.getElementById('conn-text').textContent = '已连接';
  };
  evtSource.onerror = ()=>{
    document.getElementById('conn-dot').className = 'dead';
    document.getElementById('conn-text').textContent = '断开 (重连中)';
  };
  evtSource.onmessage = (e)=>{
    try{
      const msg = JSON.parse(e.data);
      handleEvent(msg.type, msg.data);
    }catch(ex){}
  };
}

function handleEvent(type, data){
  switch(type){
    case 'connected':
      addLog('event','已连接仪表盘');
      refreshStatus();
      break;
    case 'game_event':
      addLog('event', `游戏事件: ${data.msg_name || '?'}`);
      refreshStatus();
      break;
    case 'ai_decision':
      addLog('ai', `AI决策: ${data.action} tile=${data.tile} (${data.reason||''})`);
      refreshStatus();
      break;
    case 'action_done':
      addLog('action', `✔ 执行: ${data.action} tile=${data.tile}`);
      refreshStatus();
      break;
    case 'action_failed':
      addLog('fail', `✘ 失败: ${data.action} tile=${data.tile}`);
      refreshStatus();
      break;
    case 'control':
      document.getElementById('auto-badge').className =
        'badge ' + (data.auto_mode ? 'on' : 'off');
      document.getElementById('auto-badge').textContent =
        data.auto_mode ? 'AUTO ON' : 'AUTO OFF';
      break;
  }
}

// ═══════════════ API ═══════════════
async function api(action){
  switch(action){
    case 'toggle':
      const r = await fetch('/api/status');
      const s = await r.json();
      // Toggle via control event
      await fetch('/api/ping');
      // Trigger event via EventBus if available
      addLog('event','切换自动模式 (发送中...)');
      break;
    case 'kill':
      addLog('fail','紧急停止!');
      break;
    case 'simulate':
      addLog('event','模拟对局 (发送中...)');
      simulateGame();
      break;
    case 'clear_log':
      logLines = [];
      document.getElementById('log-container').innerHTML = '';
      break;
    case 'apply_strategy':
      addLog('ai','策略参数已更新');
      break;
  }
}

// ═══════════════ SIMULATE GAME ═══════════════
function simulateGame(){
  // 本地模拟一个完整对局流程展示
  const steps = [
    {d:800, fn:()=>addLog('event','=== GAME START ===')},
    {d:600, fn:()=>{
      document.getElementById('game-badge').className='badge on';
      document.getElementById('game-badge').textContent='游戏中';
      addLog('event','新局: 东1局 本场0');
      // 显示模拟手牌
      const hand = [0,0,0,1,2,3,6,7,8,11,12,13,30];
      renderHand(hand);
      renderRound({wind:0,num:0,ben:0,left:69,dora:27,deposits:0});
    }},
    {d:400, fn:()=>addLog('event','摸牌: 5m')},
    {d:300, fn:()=>{
      addLog('ai','AI: 切牌 4m (向听=0, 安全=0.85)');
      const hand2 = [0,0,0,1,2,4,6,7,8,11,12,13,30,4];
      renderHand(hand2, 5);
    }},
    {d:400, fn:()=>addLog('action','✔ 执行: discard tile=3 (4m)')},
    {d:800, fn:()=>addLog('event','对手1 切牌: 7p')},
    {d:400, fn:()=>addLog('ai','AI: 跳过 (无鸣牌机会)')},
    {d:500, fn:()=>addLog('event','摸牌: 2m')},
    {d:300, fn:()=>{
      addLog('ai','AI: 切牌 北 (安全牌, 向听=0)');
      const hand3 = [0,0,0,1,2,3,6,7,8,11,12,13,4,1];
      renderHand(hand3, 1);
    }},
    {d:300, fn:()=>addLog('action','✔ 执行: discard tile=30 (北)')},
  ];

  let i = 0;
  function next(){
    if(i >= steps.length) return;
    steps[i].fn();
    i++;
    if(i < steps.length) setTimeout(next, steps[i].d);
  }
  setTimeout(next, steps[0].d);
}

// ═══════════════ RENDER ═══════════════
function renderHand(hand, drawnTile=-1){
  const container = document.getElementById('hand-tiles');
  let html = '';
  for(let i=0;i<hand.length;i++){
    const t = hand[i];
    let cls = '';
    if(i>0 && TILES[t] && TILES[hand[i-1]] && TILES[t].s !== TILES[hand[i-1]].s) cls='sep';
    if(i === hand.length-1 && drawnTile >= 0 && t === drawnTile) cls += ' drawn';
    if(TILES[t] && TILES[t].r) cls += ' red';
    html += tileHTML(t, cls);
  }
  html += `<span style="margin-left:8px;font-size:0.75rem;color:var(--dim)">${hand.length}枚</span>`;
  container.innerHTML = html;
}

function renderRound(info){
  document.getElementById('round-info').innerHTML = `
    <div class="item"><div class="val">${WINDS[info.wind]}${info.num+1}局</div><div class="lbl">局</div></div>
    <div class="item"><div class="val">${info.ben}</div><div class="lbl">本场</div></div>
    <div class="item"><div class="val">${info.left}</div><div class="lbl">剩余</div></div>
    <div class="item"><div class="val">${tileSmall(info.dora,'')}</div><div class="lbl">宝牌指示</div></div>
    <div class="item"><div class="val">${info.deposits}</div><div class="lbl">立直棒</div></div>
  `;
}

function renderOpponents(players, selfSeat){
  const container = document.getElementById('opponents');
  let html = '';
  for(let i=0;i<4;i++){
    if(i === selfSeat) continue;
    const p = players[i] || {};
    const name = `对手${i+1}${i===0?' (自家)':''}`;
    const seatLabel = ['自家','下家','对家','上家'][(i-selfSeat+4)%4];
    html += `<div class="player-card">
      <div class="name">${name} <span style="color:var(--dim);font-weight:400">${seatLabel}</span></div>
      <div class="meta">分数: ${(p.score||25000).toLocaleString()} |
        手牌: ${p.hand_count||'?'}枚 |
        舍牌: ${p.discards_count||0}枚 |
        ${p.is_liqi?'🔴立直':'门前清'}</div>`;
    if(p.discards && p.discards.length > 0){
      html += '<div class="discard-row">';
      for(const t of p.discards.slice(-12)){
        html += tileSmall(t);
      }
      html += '</div>';
    }
    if(p.melds && p.melds.length > 0){
      html += '<div class="meld-row">';
      for(const m of p.melds){
        html += `<span class="meld-tag">${MELD_NAMES[m.type]||'?'}</span>`;
        for(const t of m.tiles||[]) html += tileSmall(t);
      }
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

async function refreshStatus(){
  try{
    const r = await fetch('/api/status');
    const s = await r.json();

    document.getElementById('auto-badge').className =
      'badge ' + (s.auto_mode ? 'on' : 'off');
    document.getElementById('auto-badge').textContent =
      s.auto_mode ? 'AUTO ON' : 'AUTO OFF';

    document.getElementById('game-badge').className =
      'badge ' + (s.in_game ? 'on' : 'idle');
    document.getElementById('game-badge').textContent =
      s.in_game ? '游戏中' : '未在游戏中';

    if(s.in_game){
      renderRound({
        wind:s.round_wind, num:s.round_number, ben:s.honba,
        left:s.left_tiles, dora:s.dora_indicator, deposits:s.deposits.reduce((a,b)=>a+b,0)
      });

      const self = s.players[s.self_seat];
      if(self && self.hand && self.hand.length > 0){
        renderHand(self.hand);
       }

      // 舍牌区
      if(self && self.discards){
        let dh = '';
        for(const t of self.discards.slice(-12)) dh += tileSmall(t);
        document.getElementById('self-discard-area').innerHTML = dh || '(无)';
      }

      // 副露
      if(self && self.melds){
        let mh = '';
        for(const m of self.melds){
          mh += `<span class="meld-tag">${MELD_NAMES[m.type]||'?'}</span> `;
          for(const t of m.tiles||[]) mh += tileSmall(t);
        }
        document.getElementById('self-meld-area').innerHTML = mh || '';
       }

      renderOpponents(s.players, s.self_seat);
     }

    if(s.executor){
      document.getElementById('exec-count').textContent = s.executor.action_count;
      document.getElementById('fail-count').textContent = s.executor.fail_count;
    }
  }catch(e){}
}

function addLog(cssClass, text){
  const now = new Date();
  const time = now.toTimeString().slice(0,8);
  logLines.push({time,text,cssClass});
  if(logLines.length > 500) logLines.shift();
  const container = document.getElementById('log-container');
  const div = document.createElement('div');
  div.className = `entry ${cssClass}`;
  div.innerHTML = `<span class="time">${time}</span>${text}`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function onStrategyChange(){
  document.getElementById('val-agg').textContent = document.getElementById('slider-agg').value;
  document.getElementById('val-speed').textContent = document.getElementById('slider-speed').value;
  document.getElementById('val-risk').textContent = document.getElementById('slider-risk').value;
}

// ═══════════════ INIT ═══════════════
connectSSE();
refreshStatus();
setInterval(refreshStatus, 3000);  // 每3秒轮询状态

// 初始显示一些模拟数据
addLog('event','仪表盘已就绪 — 等待游戏事件...');
</script>
