// 雀魂 (Mahjong Soul) 协议定义 - liqi proto
// 基于公开逆向结果，完整定义牌局消息结构

syntax = "proto3";

package liqi;

// ── 枚举定义 ──

enum Seat {
  SEAT_1 = 0;  // 东风位 (自风: 东)
  SEAT_2 = 1;  // 南风位 (自风: 南)
  SEAT_3 = 2;  // 西风位 (自风: 西)
  SEAT_4 = 3;  // 北风位 (自风: 北)
}

enum TileSuit {
  SUIT_MAN = 0;    // 万
  SUIT_PIN = 1;    // 筒
  SUIT_SOU = 2;    // 索
  SUIT_HONOR = 3;  // 字牌 (东南西北白发中)
}

enum GameAction {
  ACTION_DEAL = 1;          // 发牌
  ACTION_DISCARD = 2;       // 出牌
  ACTION_CHI = 3;           // 吃
  ACTION_PON = 4;           // 碰
  ACTION_KAN = 5;           // 杠 (明杠)
  ACTION_ANKAN = 6;         // 暗杠
  ACTION_KAKAN = 7;         // 加杠
  ACTION_RICHI = 8;         // 立直
  ACTION_TSUMO = 9;         // 自摸
  ACTION_RON = 10;          // 荣和
  ACTION_PASS = 11;         // 跳过 (不鸣牌)
  ACTION_NINE_ORPHANS = 12; // 九种九牌
  ACTION_REACH = 13;        // 宣告立直
  ACTION_DRAW = 14;         // 摸牌
  ACTION_NEW_ROUND = 15;    // 新一局开始
}

// ── 基础类型 ──

message Tile {
  int32 suit = 1;      // 0=万 1=筒 2=索 3=字
  int32 value = 2;     // 1-9 (字牌: 1-7对应东南西北白发中)
  bool is_red = 3;     // 是否赤5
  bool is_dora = 4;    // 是否宝牌
}

// ── 主要消息 ──

// 包装消息 - 所有 WebSocket 消息的通用结构
message Wrapper {
  string name = 1;       // 消息类型名
  bytes data = 2;        // 具体消息的 protobuf 编码数据
}

// 鉴权
message ReqLogin {
  string account = 1;
  string password = 2;
  string device_id = 3;
  int32 reconnect = 4;
  string version = 5;
  string client_version = 6;
}

message RspLogin {
  int32 result = 1;
  string token = 2;
}

// 进入房间 / 匹配
message ReqJoinRoom {
  int32 room_id = 1;
  int32 mode = 2;        // 游戏模式
}

message RspJoinRoom {
  int32 result = 1;
  RoomInfo room_info = 2;
}

message RoomInfo {
  int32 room_id = 1;
  int32 mode = 2;
  repeated PlayerInfo players = 3;
  string game_uuid = 4;
}

message PlayerInfo {
  int32 seat = 1;         // 座位 (0-3)
  string nickname = 2;
  int32 score = 3;        // 初始点数
  int32 level_id = 4;
  string avatar = 5;
  string character = 6;
}

// ── 牌局相关 ──

message NewRound {
  int32 chang = 1;         // 场风 (0=东, 1=南)
  int32 ju = 2;            // 局数 (0-3)
  int32 ben = 3;           // 本场数
  int32 tile_count = 4;    // 牌山剩余枚数
  repeated int32 tiles = 5; // 自家手牌 (13枚)
  int32 dora_indicator = 6;// 宝牌指示牌
  repeated int32 scores = 7;// 四位玩家点数
  repeated int32 deposits = 8; // 供托 (立直棒)
  int32 oya = 9;           // 庄家座位
}

// 摸牌
message DrawTile {
  int32 seat = 1;     // 谁摸牌
  int32 tile = 2;     // 摸到的牌 (只有自家可见)
  int32 left_count = 3; // 牌山剩余
}

// 出牌
message DiscardTile {
  int32 seat = 1;        // 谁出牌
  int32 tile = 2;        // 打出的牌
  bool is_liqi = 3;      // 是否立直出牌
  int32 moqie = 4;       // 0=手切 1=摸切
}

// 鸣牌操作
message Chi {
  int32 seat = 1;
  int32 tile = 2;         // 被吃的牌
  int32 tile1 = 3;        // 吃牌组合1
  int32 tile2 = 4;        // 吃牌组合2
}

message Pon {
  int32 seat = 1;
  int32 tile = 2;         // 被碰的牌
  int32 from = 3;         // 从谁那碰的
}

message Kan {
  int32 seat = 1;
  int32 tile = 2;
  int32 type = 3;         // 1=明杠 2=暗杠 3=加杠
  int32 from = 4;
}

// 立直
message Liqi {
  int32 seat = 1;
  int32 tile = 2;         // 立直出牌
}

// 和牌
message Hu {
  int32 seat = 1;         // 和牌者
  int32 from = 2;         // 点炮者 (自摸时=seat)
  int32 tile = 3;         // 和牌牌
  bool zimo = 4;          // 是否自摸
  repeated int32 tiles = 5; // 手牌
  repeated MeldInfo melds = 6; // 副露
  int32 fu = 7;
  int32 fan = 8;
  int32 score = 9;        // 所得分数
  repeated int32 scores = 10; // 点数变动
  repeated int32 yaku = 11;   // 役种
  bool baoman = 12;
  int32 fan_id = 13;
}

message MeldInfo {
  int32 type = 1;     // 1=吃 2=碰 3=明杠 4=暗杠 5=加杠
  int32 tile = 2;     // 组成牌 编码
  int32 from = 3;     // 来自谁
  repeated int32 tiles = 4;
}

// 流局
message Liuju {
  int32 type = 1;     // 流局类型
  repeated int32 tenpai = 2; // 听牌者座位
  repeated int32 scores = 3;
}

// ── 牌局整体状态 ──

message GameState {
  int32 chang = 1;
  int32 ju = 2;
  int32 ben = 3;
  int32 oya = 4;
  repeated int32 scores = 5;
  repeated int32 deposits = 6;
  repeated int32 hands = 7;          // 自家手牌 (已编码)
  repeated int32 discards_0 = 10;    // 座位0的舍牌
  repeated int32 discards_1 = 11;
  repeated int32 discards_2 = 12;
  repeated int32 discards_3 = 13;
  repeated MeldInfo melds_0 = 14;
  repeated MeldInfo melds_1 = 15;
  repeated MeldInfo melds_2 = 16;
  repeated MeldInfo melds_3 = 17;
  int32 dora_indicator = 18;
  int32 left_tile_count = 19;
  repeated int32 liqi = 20;          // 立直状态
  int32 last_action = 21;
  int32 last_tile = 22;
}

// ── 操作请求/响应 ──

message ReqAction {
  int32 type = 1;         // 动作类型
  int32 tile = 2;         // 关联牌
  int32 index = 3;        // 手牌索引 (打牌时)
}

message RspAction {
  int32 result = 1;
}
